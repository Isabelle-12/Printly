    <style>
        :root {
            --brand: #6c757d;
            --brand-dark: #495057;
            --accent: #4e324e;
            --surface: #ffffff;
            --bg: #f8f9fa;
            --border: #dee2e6;
            --text: #212529;
            --muted: #6c757d;
            --radius: 8px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background-color: #412746 !important;
            padding: 0.75rem 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .navbar-brand {

            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.3rem;
            color: #fff !important;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card-header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0 !important;
        }

        .card-header h5 {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent);
            margin: 0;
        }

        .form-label {
            font-size: 0.825rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.35rem;
        }

        .form-control,
        .form-select {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.55rem 0.85rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background-color: #fdfdfd;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(108, 117, 125, 0.15);
            background-color: #fff;
        }

        .form-control::placeholder {
            color: #adb5bd;
            font-size: 0.9rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .btn-primary-custom {
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 0.6rem 2rem;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background-color 0.15s, transform 0.1s;
            display: inline-block;
            text-decoration: none;
        }

        .btn-primary-custom:hover {
            background-color: #470e55;
            transform: translateY(-1px);
            color: #fff;
        }

        .btn-secondary-custom {
            background-color: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.15s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary-custom:hover {
            background-color: #e9ecef;
            color: var(--text);
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            padding-top: 0.5rem;
        }

        @media (max-width: 576px) {
            .form-actions {
                flex-direction: column-reverse;
            }
            .btn-primary-custom,
            .btn-secondary-custom {
                width: 100%;
                text-align: center;
            }
        }

        /* ===== SINO DE NOTIFICACOES ===== */
        .sino-wrapper { position: relative; display: inline-flex; align-items: center; }
        #btn-sino { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.82); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 0.35rem 0.75rem; font-size: 0.9rem; cursor: pointer; transition: background 0.18s, color 0.18s; position: relative; display: flex; align-items: center; }
        #btn-sino:hover, #btn-sino.sino-ativo { background: rgba(255,255,255,0.22); color: #fff; }
        #sino-badge { display: none; position: absolute; top: -6px; right: -6px; background: #e03c6e; color: #fff; font-size: 0.65rem; font-weight: 700; border-radius: 50%; width: 18px; height: 18px; align-items: center; justify-content: center; border: 2px solid var(--printly-primary, #412746); z-index: 10; }
        #sino-dropdown { display: none; position: absolute; top: calc(100% + 10px); right: 0; width: 320px; background: #fff; border: 1px solid rgba(194,185,194,0.55); border-radius: 12px; box-shadow: 0 8px 32px rgba(65,39,70,0.15); z-index: 1050; overflow: hidden; }
        #sino-dropdown.sino-aberto { display: block; }
        .sino-header { padding: 0.75rem 1rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; color: #412746; border-bottom: 1px solid rgba(194,185,194,0.4); background: #f0cef5; }
        #sino-lista { list-style: none; margin: 0; padding: 0; max-height: 340px; overflow-y: auto; }
        .sino-item { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(194,185,194,0.3); cursor: default; }
        .sino-item:last-child { border-bottom: none; }
        .sino-nao-lida { background: #fdf4ff; }
        .sino-item-titulo { font-weight: 600; font-size: 0.85rem; color: #412746; margin-bottom: 2px; }
        .sino-item-msg { font-size: 0.8rem; color: #5a3a5a; margin-bottom: 3px; }
        .sino-item-data { font-size: 0.72rem; color: #9e939e; }
        .sino-vazio { padding: 1.25rem 1rem; text-align: center; color: #9e939e; font-size: 0.85rem; list-style: none; }
        /* ===== SUB-NAVBAR ===== */
        .sub-navbar { background: rgba(65,39,70,0.92); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0.25rem 0; }
        .sub-navbar .nav-link { color: rgba(255,255,255,0.75) !important; font-size: 0.82rem; font-weight: 500; padding: 0.3rem 0.85rem !important; border-radius: 6px; transition: background 0.15s, color 0.15s; }
        .sub-navbar .nav-link:hover, .sub-navbar .nav-link.active { background: rgba(255,255,255,0.14); color: #fff !important; }
    </style>
</head>
