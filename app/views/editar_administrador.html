<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Administrador - Printly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-acesso="ADMIN">

<div class="container mt-4">
    <h2>Editar Administrador</h2>

    <form id="formEditarUsuario">
        <input type="hidden" id="id">

        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="documento" class="form-label">Documento</label>
            <input type="text" id="documento" class="form-control">
        </div>

        <div class="mb-3">
            <label for="endereco" class="form-label">Endereço</label>
            <input type="text" id="endereco" class="form-control">
        </div>

        <div class="mb-3">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="text" id="telefone" class="form-control">
        </div>

        <div class="mb-3">
            <label for="cep" class="form-label">CEP</label>
            <input type="text" id="cep" class="form-control">
        </div>

        <div class="mb-3">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" id="cidade" class="form-control">
        </div>

        <div class="mb-3">
            <label for="estado" class="form-label">Estado</label>
            <input type="text" id="estado" class="form-control">
        </div>

        <div class="mb-3">
            <label for="tipo_perfil" class="form-label">Tipo de Perfil</label>
            <select id="tipo_perfil" class="form-select">
                <option value="CLIENTE">Usuário</option>
                <option value="MAKER">Fabricante</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="nova_senha" class="form-label">Nova Senha</label>
            <input type="password" id="nova_senha" class="form-control">
        </div>

        <div class="mb-3">
            <label for="confirmar_senha" class="form-label">Confirmar Senha</label>
            <input type="password" id="confirmar_senha" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary" id="salvar">Salvar Alterações</button>
        <a href="index.php?rota=admin-usuarios" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<!-- Link para o JS separado -->
 
<script src="../app/controllers/usuario/js/verif.js"></script>
<script src="../app/controllers/admin/js/editar_administrador.js"></script>

</body>
</html>
