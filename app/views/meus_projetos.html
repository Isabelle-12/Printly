<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos - Printly</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --printly-primary: #412746;
            --printly-primary-dark: #7a3077;
            --printly-accent: #5a0a61;
            --printly-light: #f0cef5;
            --printly-surface: #ffffff;
            --printly-bg: #fff5fe;
            --printly-text: #7e1b7e;
            --printly-muted: #9e939e;
            --printly-border: #c2b9c28c;
            --printly-shadow: 0 2px 12px rgba(229, 70, 181, 0.08);
            --printly-radius: 12px;
        }

        /* =========================
        RESET / BASE
        ========================= */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--printly-bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--printly-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* =========================
        CONTAINER
        ========================= */

        .container {
            max-width: 1200px;
        }

        /* =========================
        NAVBAR
        ========================= */

        .navbar {
            background: linear-gradient(
                135deg,
                var(--printly-primary) 0%,
                var(--printly-primary-dark) 100%
            ) !important;
            padding: 0.75rem 0;
            box-shadow: 0 2px 16px rgba(229, 70, 216, 0.25);
        }

        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #fff !important;
        }

        .navbar .nav-link {
            color: rgba(255,255,255,0.82) !important;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.45rem 0.9rem !important;
            border-radius: 8px;
            transition: 0.2s;
        }

        .navbar .nav-link:hover,
        .navbar .nav-link.active {
            background: rgba(255,255,255,0.18);
            color: #fff !important;
        }

        /* botão sair */
        #sair {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.82);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        #sair:hover {
            background: rgba(255,255,255,0.22);
            color: #fff;
        }

        /* =========================
        HEADER
        ========================= */

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--printly-border);
        }

        .page-header h4 {
            font-weight: 700;
        }

        .page-header p {
            color: var(--printly-muted);
        }

        /* =========================
        FILTROS
        ========================= */

        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .filtros button {
            background: var(--printly-surface);
            border: 1px solid var(--printly-border);
            color: var(--printly-primary);
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--printly-shadow);
        }

        .filtros button:hover,
        .filtros button.ativo {
            background: var(--printly-primary);
            color: #fff;
        }

        /* =========================
        GRID
        ========================= */

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        /* =========================
        CARD
        ========================= */

        .card {
            background: var(--printly-surface);
            border: 1px solid var(--printly-border);
            border-radius: var(--printly-radius);
            box-shadow: var(--printly-shadow);
            overflow: hidden;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* imagem */
        .card-imagem {
            position: relative;
            height: 200px;
            background: var(--printly-light);
        }

        .card-imagem img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* status */
        .status {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 5px 13px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #fff;
        }

        .analise { background: #f59e0b; }
        .aceito { background: #10b981; }
        .producao { background: #3b82f6; }
        .concluido { background: #059669; }
        .negado { background: #ef4444; }
        .bloqueado { background: #6b7280; }

        /* header card */
        .card-header {
            background: var(--printly-light);
            border-bottom: 1px solid var(--printly-border);
            padding: 0.85rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: var(--printly-primary);
        }

        .card-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--printly-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon i {
            color: #fff;
        }

        /* body */
        .card-body {
            padding: 1.25rem;
            word-break: break-word;
        }

        .card-body p.desc {
            color: var(--printly-muted);
            font-size: 0.9rem;
            margin-bottom: 14px;
        }

        .informacoes {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--printly-primary-dark);
        }

        /* feedback */
        .feedback-maker {
            background: #fff0f0;
            border-left: 4px solid #ef4444;
            padding: 10px 12px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 14px;
            color: #991b1b;
            font-size: 0.88rem;
        }

        /* ações */
        .acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .acoes button {
            flex: 1;
            border: none;
            padding: 9px 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            background: var(--printly-primary);
            color: #fff;
            transition: 0.2s;
        }

        .acoes button:hover {
            background: var(--printly-primary-dark);
        }

        .acoes .btn-danger {
            background: #ef4444;
        }

        .acoes .btn-danger:hover {
            background: #dc2626;
        }

        /* =========================
        MODAL (CORRIGIDO)
        ========================= */

        .modal-content {
            border-radius: 18px;
            border: none;
            overflow: hidden;
        }

        .modal-header {
            background: var(--printly-light);
            border-bottom: 1px solid var(--printly-border);
        }

        .modal-title {
            font-weight: 700;
            color: var(--printly-primary);
        }

        /* CORREÇÃO PRINCIPAL DO SCROLL */
        .modal-dialog-scrollable .modal-content {
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .modal-body {
            overflow-y: auto;
            max-height: 70vh;
            padding-bottom: 1rem;
        }

        .modal-footer {
            position: sticky;
            bottom: 0;
            background: #fff;
            z-index: 2;
            border-top: 1px solid var(--printly-border);
        }

        /* =========================
        TIMELINE
        ========================= */

        .timeline {
            position: relative;
            padding-left: 30px;
            margin-top: 20px;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 10px;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--printly-border);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -24px;
            top: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #c4c4c4;
        }

        .timeline-item.ativo::before { background: #3b82f6; }
        .timeline-item.concluido::before { background: #10b981; }

        /* =========================
        PROGRESSO
        ========================= */

        .progress {
            height: 10px;
            border-radius: 999px;
        }

        .progress-bar {
            background: linear-gradient(
                90deg,
                var(--printly-primary),
                var(--printly-primary-dark)
            );
        }

        /* =========================
        PARTES
        ========================= */

        .parte-card {
            border: 1px solid var(--printly-border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            background: #fff;
        }

        /* =========================
        EMPTY STATE
        ========================= */

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 70px 20px;
            background: #fff;
            border-radius: 16px;
            border: 1px dashed var(--printly-border);
        }

        /* =========================
        RESPONSIVO
        ========================= */

        @media (max-width: 576px) {

            .cards-container {
                grid-template-columns: 1fr;
            }

            .acoes {
                flex-direction: column;
            }

            .acoes button {
                width: 100%;
            }

            .modal-body {
                max-height: 65vh;
            }
        }
    </style>

</head>

    <script>

        let filtroAtual = "TODOS";

        document.querySelectorAll('.filtros button').forEach(btn => {

            btn.addEventListener('click', function () {

                document
                    .querySelector('.filtros .ativo')
                    .classList.remove('ativo');

                document
                    .querySelectorAll('.filtros button')
                    .forEach(b => {

                        b.classList.remove('btn-dark');
                        b.classList.add('btn-outline-secondary');

                    });

                this.classList.add('ativo');

                this.classList.remove('btn-outline-secondary');

                this.classList.add('btn-dark');

                filtroAtual = this.dataset.status;

                if (typeof filtrarProjetos === 'function') {

                    filtrarProjetos(filtroAtual);

                }

            });

        });

    </script>
