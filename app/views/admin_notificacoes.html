        <a class="navbar-brand" href="index.php?rota=admin-notificacoes">Printly</a>

<div class="container mt-5">
    <h1 class="mb-4">Painel de Notificações — Administrador</h1>

    
    <div id="banner-anuncios" class="d-none">
        <div class="alert alert-warning alert-dismissible fade show mb-3" role="alert">
            <strong id="banner-titulo"></strong> &mdash; <span id="banner-mensagem"></span>
            <br><small class="text-muted">Período: <span id="banner-periodo"></span></small>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
    </div>

    <!-- Critério 1: Notificar atrasos -->
    <div class="card">
        <div class="card-header">
            <h5>Notificar Atrasos em Pedidos</h5>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3">Pedidos com prazo expirado e ainda não concluídos:</p>
            <div id="pedidos-atrasados">
                <p class="text-muted">Carregando...</p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Agendar Manutenção Programada</h5>
        </div>
        <div class="card-body">
        
            <form id="form-manutencao">
                <div class="mb-3">
                    <label for="titulo" class="form-label">Título do Aviso</label>
                    <input type="text" class="form-control" id="titulo" name="titulo" required>
                </div>
                <div class="mb-3">
                    <label for="mensagem" class="form-label">Mensagem</label>
                    <textarea class="form-control" id="mensagem" name="mensagem" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="data_inicio" class="form-label">Data e Hora de Início</label>
                    <input type="datetime-local" class="form-control" id="data_inicio" name="data_inicio" required>
                </div>
                <div class="mb-3">
                    <label for="data_fim" class="form-label">Data e Hora de Fim</label>
                    <input type="datetime-local" class="form-control" id="data_fim" name="data_fim" required>
                </div>
                <button type="submit" class="btn btn-success">Agendar Manutenção</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Notificações Enviadas / Retratar</h5>
        </div>
        <div class="card-body">
            <div id="notificacoes-enviadas">
                <p class="text-muted">Carregando...</p>
            </div>
        </div>
    </div>
</div>
