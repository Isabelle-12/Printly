<body data-acesso="MAKER,ADMIN">

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.php?rota=fabricante-painel">Printly</a>
        </div>

    <div class="container mt-4">

        <div class="page-header">
            <div>
                <h4>Editar Portfólio</h4>
                <p>Adicione fotos dos seus trabalhos de impressão 3D</p>
            </div>
            <a href="index.php?rota=perfil-fabricante" class="btn-cancelar">
                Voltar
            </a>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Dados do Fabricante</h5>
            </div>

            <div class="card-body">
                <form id="formDadosFabricante" enctype="multipart/form-data">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome_empresa" class="form-label">Nome da empresa</label>
                            <input type="text" id="nome_empresa" name="nome_empresa" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="email_comercial" class="form-label">E-mail comercial</label>
                            <input type="email" id="email_comercial" name="email_comercial" class="form-control">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="cnpj" class="form-label">CNPJ</label>
                            <input type="text" id="cnpj" name="cnpj" class="form-control">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="telefone_comercial" class="form-label">Telefone comercial</label>
                            <input type="text" id="telefone_comercial" name="telefone_comercial" class="form-control">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="foto_empresa" class="form-label">Foto empresarial</label>
                            <input type="file" id="foto_empresa" name="foto_empresa" class="form-control" accept="image/*">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label for="endereco_empresa" class="form-label">Endereço da empresa / ateliê</label>
                            <input type="text" id="endereco_empresa" name="endereco_empresa" class="form-control">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-editar-card">
                        <i class="bi bi-check-circle"></i>       Salvar dados do fabricante
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Adicionar Informações</h5>
            </div>

            <div class="card-body">
                <form id="formPortfolioMaker" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título do projeto</label>
                        <input type="text" id="titulo" name="titulo" class="form-control" placeholder="Ex: Miniatura personalizada" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea id="descricao" name="descricao" class="form-control" rows="3" placeholder="Descreva brevemente esse trabalho"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="imagem" class="form-label">Imagem do projeto</label>
                        <input type="file" id="imagem" name="imagem" class="form-control" accept="image/*" required>
                    </div>

                    <button type="submit" class="btn btn-editar-card">
                        <i class="bi bi-check-circle"></i>         Salvar no Portfólio
                    </button>
                </form>
            </div>

            <div class="modal fade" id="modalEditarPortfolio" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">Editar item do portfólio</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                        </div>

                        <div class="modal-body">
                            <form id="formEditarItemPortfolio">
                                <input type="hidden" id="editar_id" name="id">

                                <div class="mb-3">
                                    <label for="editar_titulo" class="form-label">Título</label>
                                    <input type="text" id="editar_titulo" name="titulo" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label for="editar_descricao" class="form-label">Descrição</label>
                                    <textarea id="editar_descricao" name="descricao" class="form-control" rows="3"></textarea>
                                </div>

                                <button type="submit" class="btn btn-editar-card">
                                    <i class="bi bi"></i>Salvar alterações
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Projetos / Portfólio</h5>
            </div>
            <div class="card-body">
                <div id="listaPortfolioMaker" class="portfolio-grid">
                    <p class="text-muted">Carregando fotos...</p>
                </div>
            </div>
