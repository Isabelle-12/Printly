<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar ser Maker – Printly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand: #6c757d;
            --brand-dark: #495057;
            --accent: #40343f;
            --surface: #ffffff;
            --bg: #f8f9fa;
            --border: #dee2e6;
            --text: #292128;
            --muted: #7d6c79;
            --radius: 8px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background-color: #412746 !important;
        }

        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.3rem;
        }

        /* ── Page title ── */
        .page-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--muted);
        }

        /* ── Cards ── */
        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card-header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0 !important;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h5,
        .card-header .fw-semibold {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent);
            margin: 0;
        }

        /* ── Form ── */
        .form-label {
            font-size: 0.825rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.35rem;
        }

        .form-control {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.55rem 0.85rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background-color: #fdfdfd;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(108, 117, 125, 0.15);
            background-color: #fff;
        }

        .form-control::placeholder {
            color: #adb5bd;
            font-size: 0.9rem;
        }

        /* ── Botão adicionar ── */
        .btn-add {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.35rem 0.85rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.825rem;
            cursor: pointer;
            transition: background 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-add:hover { background: #f0eef0; }

        /* ── Botão remover ── */
        .btn-remove {
            background: transparent;
            color: #dc3545;
            border: 1px solid #f5c2c7;
            border-radius: var(--radius);
            padding: 0.35rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-remove:hover { background: #fff0f0; }

        /* ── Feedback ── */
        #msg-feedback {
            border-radius: var(--radius);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* ── Botão primário ── */
        .btn-primary-custom {
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 0.6rem 2rem;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.15s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary-custom:hover {
            background-color: #412746;
            transform: translateY(-1px);
        }

        @media (max-width: 576px) {
            .btn-primary-custom { width: 100%; }
        }
    </style>
</head>
<body data-acesso="CLIENTE,ADMIN">

    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.php?rota=usuario-painel">Printly</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width:700px">

        <div class="d-flex align-items-center gap-3 mb-1">
            <h1 class="page-title mb-0">Solicitar ser Maker</h1>
        </div>
        <p class="page-subtitle mb-4">Preencha as informações abaixo. Sua solicitação será analisada pelos administradores.</p>

        <div id="msg-feedback" class="d-none"></div>

        <!-- Dados do negócio -->
        <div class="card">
            <div class="card-header">
                <h5>Dados do Negócio</h5>
            </div>
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label">Nome da Empresa</label>
                    <input type="text" id="nome_empresa" class="form-control" placeholder="Nome da empresa">
                </div>
                <div class="mb-3">
                        <label class="form-label">E-mail Comercial</label>
                        <input type="email" id="email_comercial" class="form-control" placeholder="contato@empresa.com">
                    </div>
                <div class="mb-3">
                    <label class="form-label">CNPJ <small class="text-muted">(opcional)</small></label>
                    <input type="text" id="cnpj" class="form-control" placeholder="00.000.000/0000-00">
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefone Comercial</label>
                    <input type="text" id="telefone_comercial" class="form-control" placeholder="(41) 99999-0000">
                </div>
                <div class="mb-3">
                    <label class="form-label">Endereço da Empresa / Ateliê</label>
                    <input type="text" id="endereco_empresa" class="form-control" placeholder="Rua, número, bairro, cidade">
                </div>
            </div>
        </div>

        <!-- Impressoras -->
        <div class="card">
            <div class="card-header">
                <h5>Impressoras</h5>
                <button class="btn-add" onclick="adicionarImpressora()">
                    <i class="bi bi-plus"></i> Adicionar
                </button>
            </div>
            <div class="card-body p-4" id="lista-impressoras">
                <!-- linhas geradas dinamicamente -->
            </div>
        </div>

        <!-- Materiais -->
        <div class="card">
            <div class="card-header">
                <h5>Materiais que Imprime</h5>
                <button class="btn-add" onclick="adicionarMaterial()">
                    <i class="bi bi-plus"></i> Adicionar
                </button>
            </div>
            <div class="card-body p-4" id="lista-materiais">
                <!-- linhas geradas dinamicamente -->
            </div>
        </div>

        <button class="btn-primary-custom mb-5" onclick="enviarSolicitacao()">
            <i class="bi bi-send"></i> Enviar Solicitação
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../app/controllers/usuario/js/verif.js"></script>

    <script>
        const materiaisPorTipo = {
            FDM: ['PLA', 'ABS', 'PETG', 'TPU', 'Nylon', 'ASA', 'PVA'],
            SLS: ['Nylon (Pó)', 'Poliestireno', 'Alumida'],
            SLA: ['Resina'],
            DLP: ['Resina']
        };

        function atualizarOpcoesMateriaisDisponiveis() {
            const tiposSelecionados = new Set();
            document.querySelectorAll('.imp-tipo:checked').forEach(cb => {
                tiposSelecionados.add(cb.value);
            });

            const materiaisDisponiveis = new Set();
            tiposSelecionados.forEach(tipo => {
                (materiaisPorTipo[tipo] || []).forEach(m => materiaisDisponiveis.add(m));
            });

            document.querySelectorAll('.mat-tipo').forEach(sel => {
                const valorAtual = sel.value;
                sel.innerHTML = '<option value="">Selecione o material...</option>';
                materiaisDisponiveis.forEach(mat => {
                    const opt = document.createElement('option');
                    opt.value = mat;
                    opt.textContent = mat;
                    if (mat === valorAtual) opt.selected = true;
                    sel.appendChild(opt);
                });

                if (materiaisDisponiveis.size === 0) {
                    sel.innerHTML = '<option value="">Selecione um tipo de impressora primeiro</option>';
                }
            });
        }

        function adicionarImpressora() {
            const div = document.createElement('div');
            div.className = 'mb-3 p-3 linha-impressora';
            div.style.cssText = 'border:1px solid var(--border); border-radius:var(--radius); background:#fdfdfd;';
            div.innerHTML = `
                <div class="row g-2 mb-2">
                    <div class="col-md-5">
                        <label class="form-label">Modelo</label>
                        <input type="text" class="form-control imp-modelo" placeholder="Modelo (ex: Ender 3 S1)">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Volume máx. (cm³)</label>
                        <input type="number" class="form-control imp-volume" placeholder="ex: 15625">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" min="1" class="form-control imp-quantidade" placeholder="ex: 2">
                    </div>
                    <div class="col-md-1 d-flex align-items-end pb-1">
                        <button class="btn-remove" onclick="this.closest('.linha-impressora').remove(); atualizarOpcoesMateriaisDisponiveis();">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="form-label">Tipo de Impressora</label>
                    <div class="d-flex flex-wrap gap-3">
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="FDM" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">FDM</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="SLS" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">SLS</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="SLA" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">SLA</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="DLP" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">DLP</label>
                        </div>
                    </div>
                </div>`;
            document.getElementById('lista-impressoras').appendChild(div);
        }

        function adicionarMaterial() {
            const tiposSelecionados = new Set();
            document.querySelectorAll('.imp-tipo:checked').forEach(cb => {
                tiposSelecionados.add(cb.value);
            });

            const materiaisDisponiveis = new Set();
            tiposSelecionados.forEach(tipo => {
                (materiaisPorTipo[tipo] || []).forEach(m => materiaisDisponiveis.add(m));
            });

            let opcoesHtml = '<option value="">Selecione o material...</option>';
            if (materiaisDisponiveis.size === 0) {
                opcoesHtml = '<option value="">Selecione um tipo de impressora primeiro</option>';
            } else {
                materiaisDisponiveis.forEach(mat => {
                    opcoesHtml += `<option value="${mat}">${mat}</option>`;
                });
            }

            const div = document.createElement('div');
            div.className = 'row g-2 mb-2 linha-material';
            div.innerHTML = `
                <div class="col-md-6">
                    <select class="form-control mat-tipo">${opcoesHtml}</select>
                </div>
                <div class="col-md-5">
                    <input type="number" step="0.01" class="form-control mat-preco" placeholder="R$/grama (ex: 0.15)">
                </div>
                <div class="col-md-1 d-flex align-items-center">
                    <button class="btn-remove" onclick="this.closest('.linha-material').remove()">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>`;
            document.getElementById('lista-materiais').appendChild(div);
        }

        async function enviarSolicitacao() {
            const impressoras = [...document.querySelectorAll('.linha-impressora')].map(l => {
                const tiposSelecionados = [...l.querySelectorAll('.imp-tipo:checked')].map(cb => cb.value);
                return {
                    modelo:     l.querySelector('.imp-modelo').value.trim(),
                    volume:     l.querySelector('.imp-volume').value.trim(),
                    quantidade: l.querySelector('.imp-quantidade').value.trim(),
                    tipos:      tiposSelecionados
                };
            }).filter(i => i.modelo);

            const materiais = [...document.querySelectorAll('.linha-material')].map(l => ({
                tipo:  l.querySelector('.mat-tipo').value.trim(),
                preco: l.querySelector('.mat-preco').value.trim()
            })).filter(m => m.tipo);

            const body = {
                nome_empresa:       document.getElementById('nome_empresa').value.trim(),
                email_comercial:    document.getElementById('email_comercial').value.trim(),
                cnpj:               document.getElementById('cnpj').value.trim(),
                telefone_comercial: document.getElementById('telefone_comercial').value.trim(),
                endereco_empresa:   document.getElementById('endereco_empresa').value.trim(),
                impressoras,
                materiais
            };

            const resp = await fetch('../app/controllers/usuario/php/solicitar_maker.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const texto = await resp.text();
            console.log("RESPOSTA SOLICITAR MAKER:", texto);
            const dados = JSON.parse(texto);

            const el = document.getElementById('msg-feedback');
            el.classList.remove('d-none', 'alert-success', 'alert-danger');
            if (dados.status === 'ok') {
                el.className = 'alert alert-success';
                el.textContent = '✅ Solicitação enviada! Aguarde a análise dos administradores.';
                setTimeout(() => window.location.href = 'index.php?rota=usuario-painel', 2500);
            } else {
                el.className = 'alert alert-danger';
                el.textContent = '❌ ' + dados.mensagem;
            }
        }

        adicionarImpressora();
        adicionarMaterial();
    </script>
</body>
</html>
