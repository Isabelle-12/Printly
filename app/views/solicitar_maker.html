    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const materiaisPorTipo = {
            FDM: ['PLA', 'ABS', 'PETG', 'TPU', 'Nylon', 'ASA', 'PVA'],
            SLS: ['Nylon (Pó)', 'Poliestireno', 'Alumida'],
            SLA: ['Resina'],
            DLP: ['Resina']
        };

        function atualizarOpcoesMateriaisDisponiveis() {
            const tiposSelecionados = new Set();
            document.querySelectorAll('.imp-tipo:checked').forEach(cb => {
                tiposSelecionados.add(cb.value);
            });

            const materiaisDisponiveis = new Set();
            tiposSelecionados.forEach(tipo => {
                (materiaisPorTipo[tipo] || []).forEach(m => materiaisDisponiveis.add(m));
            });

            document.querySelectorAll('.mat-tipo').forEach(sel => {
                const valorAtual = sel.value;
                sel.innerHTML = '<option value="">Selecione o material...</option>';
                materiaisDisponiveis.forEach(mat => {
                    const opt = document.createElement('option');
                    opt.value = mat;
                    opt.textContent = mat;
                    if (mat === valorAtual) opt.selected = true;
                    sel.appendChild(opt);
                });

                if (materiaisDisponiveis.size === 0) {
                    sel.innerHTML = '<option value="">Selecione um tipo de impressora primeiro</option>';
                }
            });
        }

        function adicionarImpressora() {
            const div = document.createElement('div');
            div.className = 'mb-3 p-3 linha-impressora';
            div.style.cssText = 'border:1px solid var(--border); border-radius:var(--radius); background:#fdfdfd;';
            div.innerHTML = `
                <div class="row g-2 mb-2">
                    <div class="col-md-5">
                        <label class="form-label">Modelo</label>
                        <input type="text" class="form-control imp-modelo" placeholder="Modelo (ex: Ender 3 S1)">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Volume máx. (cm³)</label>
                        <input type="number" class="form-control imp-volume" placeholder="ex: 15625">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" min="1" class="form-control imp-quantidade" placeholder="ex: 2">
                    </div>
                    <div class="col-md-1 d-flex align-items-end pb-1">
                        <button class="btn-remove" onclick="this.closest('.linha-impressora').remove(); atualizarOpcoesMateriaisDisponiveis();">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="form-label">Tipo de Impressora</label>
                    <div class="d-flex flex-wrap gap-3">
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="FDM" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">FDM</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="SLS" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">SLS</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="SLA" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">SLA</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input imp-tipo" type="checkbox" value="DLP" onchange="atualizarOpcoesMateriaisDisponiveis()">
                            <label class="form-check-label">DLP</label>
                        </div>
                    </div>
                </div>`;
            document.getElementById('lista-impressoras').appendChild(div);
        }

        function adicionarMaterial() {
            const tiposSelecionados = new Set();
            document.querySelectorAll('.imp-tipo:checked').forEach(cb => {
                tiposSelecionados.add(cb.value);
            });

            const materiaisDisponiveis = new Set();
            tiposSelecionados.forEach(tipo => {
                (materiaisPorTipo[tipo] || []).forEach(m => materiaisDisponiveis.add(m));
            });

            let opcoesHtml = '<option value="">Selecione o material...</option>';
            if (materiaisDisponiveis.size === 0) {
                opcoesHtml = '<option value="">Selecione um tipo de impressora primeiro</option>';
            } else {
                materiaisDisponiveis.forEach(mat => {
                    opcoesHtml += `<option value="${mat}">${mat}</option>`;
                });
            }

            const div = document.createElement('div');
            div.className = 'row g-2 mb-2 linha-material';
            div.innerHTML = `
                <div class="col-md-6">
                    <select class="form-control mat-tipo">${opcoesHtml}</select>
                </div>
                <div class="col-md-5">
                    <input type="number" step="0.01" class="form-control mat-preco" placeholder="R$/grama (ex: 0.15)">
                </div>
                <div class="col-md-1 d-flex align-items-center">
                    <button class="btn-remove" onclick="this.closest('.linha-material').remove()">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>`;
            document.getElementById('lista-materiais').appendChild(div);
        }

        async function enviarSolicitacao() {
            const impressoras = [...document.querySelectorAll('.linha-impressora')].map(l => {
                const tiposSelecionados = [...l.querySelectorAll('.imp-tipo:checked')].map(cb => cb.value);
                return {
                    modelo:     l.querySelector('.imp-modelo').value.trim(),
                    volume:     l.querySelector('.imp-volume').value.trim(),
                    quantidade: l.querySelector('.imp-quantidade').value.trim(),
                    tipos:      tiposSelecionados
                };
            }).filter(i => i.modelo);

            const materiais = [...document.querySelectorAll('.linha-material')].map(l => ({
                tipo:  l.querySelector('.mat-tipo').value.trim(),
                preco: l.querySelector('.mat-preco').value.trim()
            })).filter(m => m.tipo);

            const body = {
                nome_empresa:       document.getElementById('nome_empresa').value.trim(),
                email_comercial:    document.getElementById('email_comercial').value.trim(),
                cnpj:               document.getElementById('cnpj').value.trim(),
                telefone_comercial: document.getElementById('telefone_comercial').value.trim(),
                endereco_empresa:   document.getElementById('endereco_empresa').value.trim(),
                impressoras,
                materiais
            };

            const resp = await fetch('../app/controllers/usuario/php/solicitar_maker.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const texto = await resp.text();
            console.log("RESPOSTA SOLICITAR MAKER:", texto);
            const dados = JSON.parse(texto);

            const el = document.getElementById('msg-feedback');
            el.classList.remove('d-none', 'alert-success', 'alert-danger');
            if (dados.status === 'ok') {
                el.className = 'alert alert-success';
                el.textContent = '✅ Solicitação enviada! Aguarde a análise dos administradores.';
                setTimeout(() => window.location.href = 'index.php?rota=usuario-painel', 2500);
            } else {
                el.className = 'alert alert-danger';
                el.textContent = '❌ ' + dados.mensagem;
            }
        }

        adicionarImpressora();
        adicionarMaterial();
    </script>
    <script src="../app/controllers/usuario/js/sino_notif.js"></script>
